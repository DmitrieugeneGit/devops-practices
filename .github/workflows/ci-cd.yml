name: CI/CD

on:
  push:
    branches: ["main", "docker-practice"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Собрать Docker-образ
        run: docker build -t tasks-app:${{ github.sha }} .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Линтер golangci-lint
        run: docker run --rm -v "$PWD/backend":/app -w /app golangci/golangci-lint:latest golangci-lint run

